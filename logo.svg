<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="petalGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </radialGradient>
  </defs>

  <!-- outer petals -->
  <g fill="url(#petalGrad)" stroke="#c9c9c9" stroke-width="1">
    <ellipse cx="60" cy="30" rx="14" ry="20" transform="rotate(0 60 60)"/>
    <ellipse cx="60" cy="30" rx="14" ry="20" transform="rotate(45 60 60)"/>
    <ellipse cx="60" cy="30" rx="14" ry="20" transform="rotate(90 60 60)"/>
    <ellipse cx="60" cy="30" rx="14" ry="20" transform="rotate(135 60 60)"/>
    <ellipse cx="60" cy="30" rx="14" ry="20" transform="rotate(180 60 60)"/>
    <ellipse cx="60" cy="30" rx="14" ry="20" transform="rotate(225 60 60)"/>
    <ellipse cx="60" cy="30" rx="14" ry="20" transform="rotate(270 60 60)"/>
    <ellipse cx="60" cy="30" rx="14" ry="20" transform="rotate(315 60 60)"/>
  </g>

  <!-- inner petals -->
  <g fill="#ffffff" stroke="#d8d8d8" stroke-width="1">
    <ellipse cx="60" cy="40" rx="10" ry="14" transform="rotate(20 60 60)"/>
    <ellipse cx="60" cy="40" rx="10" ry="14" transform="rotate(90 60 60)"/>
    <ellipse cx="60" cy="40" rx="10" ry="14" transform="rotate(160 60 60)"/>
    <ellipse cx="60" cy="40" rx="10" ry="14" transform="rotate(230 60 60)"/>
    <ellipse cx="60" cy="40" rx="10" ry="14" transform="rotate(300 60 60)"/>
  </g>

  <!-- center -->
  <circle cx="60" cy="60" r="9" fill="#f5f0e8" stroke="#d4c9a8" stroke-width="1"/>
  <circle cx="60" cy="60" r="4" fill="#e8dcc0"/>
</svg>
